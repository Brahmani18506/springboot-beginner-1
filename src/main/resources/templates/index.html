<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpringBoot-Beginner</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
    <h1>Hello from HTML</h1>
    <script th:src="@{/js/site.js}"></script>
    <h2>Card</h2>
    <div class="card">
        <img id="userImage" src="img/john.png" alt="Avatar" style="width:100%">
        <div class="container">
            <h4 id="userName"><b>John Doe</b></h4> 
            <p id="userGender">Male</p> 
        </div>
    </div>
    <button onclick="toggleCard()">Toggle</button>
</body>
</html>
